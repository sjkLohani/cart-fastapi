      - name: SSH into EC2 and Execute Weighted Canary Traffic Shift
        uses: appleboy/ssh-action@v1.0.1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Authenticate with AWS ECR
            aws ecr get-login-password --region us-east-1 | docker login --username AWS --password-stdin 654278500703.dkr.ecr.us-east-1.amazonaws.com

            # 2. Identify active slot vs target canary slot
            if docker ps --format '{{.Names}}' | grep -q "cart_api_blue"; then
              ACTIVE_PORT="8001"
              CANARY_PORT="8002"
              CANARY_CONTAINER="cart_api_green"
            else
              ACTIVE_PORT="8002"
              CANARY_PORT="8001"
              CANARY_CONTAINER="cart_api_blue"
            fi

            echo "Target Canary Container: $CANARY_CONTAINER on Port $CANARY_PORT"

            # 3. Pull fresh image and spin up the Canary Container
            docker pull 654278500703.dkr.ecr.us-east-1.amazonaws.com/cart-api-repo:latest
            docker rm -f $CANARY_CONTAINER || true
            docker run -d --name $CANARY_CONTAINER -p $CANARY_PORT:8000 -e DATABASE_URL="${{ secrets.DATABASE_URL }}" 654278500703.dkr.ecr.us-east-1.amazonaws.com/cart-api-repo:latest

            # Give the container 5 seconds to boot up and run internal checks
            sleep 5

            # -------------------------------------------------------------
            # STAGE A: ACTIVATE CANARY (Shift 10% Traffic to New Version)
            # -------------------------------------------------------------
            echo "Shifting 10% of traffic to $CANARY_CONTAINER..."
            
            sudo cat << EOF | sudo tee /etc/nginx/sites-available/default
            upstream fastapi_backend {
                server 127.0.0.1:$ACTIVE_PORT weight=9;
                server 127.0.0.1:$CANARY_PORT weight=1;
            }
            server {
                listen 80 default_server;
                listen [::]:80 default_server;
                server_name _;
                location / {
                    proxy_pass http://fastapi_backend;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                }
            }
            EOF

            sudo systemctl reload nginx
            
            echo "Monitoring Canary health at 10% load..."
            sleep 15  # In a live system, you would insert automated curl metric checks here

            # -------------------------------------------------------------
            # STAGE B: COMMITTING CUTOVER (Shift 100% Traffic to New Version)
            # -------------------------------------------------------------
            echo "Canary stable. Committing 100% traffic shift to $CANARY_CONTAINER..."

            sudo cat << EOF | sudo tee /etc/nginx/sites-available/default
            upstream fastapi_backend {
                server 127.0.0.1:$CANARY_PORT weight=1;
            }
            server {
                listen 80 default_server;
                listen [::]:80 default_server;
                server_name _;
                location / {
                    proxy_pass http://fastapi_backend;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                }
            }
            EOF

            sudo systemctl reload nginx

            # 4. Safely dismantle old container structure
            if [ "$CANARY_CONTAINER" = "cart_api_green" ]; then
              docker rm -f cart_api_blue || true
            else
              docker rm -f cart_api_green || true
            fi
            
            echo "Deployment complete! 100% of traffic successfully cut over to $CANARY_CONTAINER."